# Application Configuration
spring.application.name=scrapbh-marketplace
server.port=8080

# Supabase Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/scrapbh}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ScrapBH-HikariCP

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Supabase Configuration
supabase.url=${SUPABASE_URL:}
supabase.key=${SUPABASE_KEY:}
supabase.service-key=${SUPABASE_SERVICE_KEY:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:post-images}

# Stripe Configuration
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Logging
logging.level.com.scrapbh=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
